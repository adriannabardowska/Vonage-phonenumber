name: Vonage Weekly Report

on:
  schedule:
    - cron: "0 8 * * 3"
    - cron: "0 9 * * 3"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check Madrid 10:00 window
        id: madrid_time
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR="$(TZ=Europe/Madrid date +%H)"
          if [ "$HOUR" = "10" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping scheduled trigger outside 10:00 Europe/Madrid."
          fi

      - name: Checkout
        if: steps.madrid_time.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.madrid_time.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.madrid_time.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Run Vonage report
        if: steps.madrid_time.outputs.run == 'true'
        env:
          VONAGE_API_KEY: ${{ secrets.VONAGE_API_KEY }}
          VONAGE_API_SECRET: ${{ secrets.VONAGE_API_SECRET }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          START_DATE_HISTORY: "2025-11-01"
          START_DATE_SMS: "2025-11-01T00:00:00Z"
        run: |
          set -o pipefail
          python3 vonage_summary.py 2>&1 | tee run.log

      - name: Persist snapshot changes
        if: steps.madrid_time.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f "vonage_numbers_snapshot.csv" ]; then
            git add vonage_numbers_snapshot.csv
          fi
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "chore: update vonage snapshot [skip ci]"
            git push
          fi

      - name: Upload generated reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vonage-report-${{ github.run_number }}
          path: |
            vonage_analytics_*.xlsx
            vonage_analytics_*_*.csv
          if-no-files-found: warn
          retention-days: 14

      - name: Upload execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vonage-log-${{ github.run_number }}
          path: run.log
          if-no-files-found: warn
          retention-days: 14
